<!-- Micro-interactions Script -->
<script>
        function adjustValue(btn, delta) {
            const input = btn.parentElement.querySelector('input');
            let val = parseFloat(input.value) || 0;
            val = Math.max(0, val + delta);
            input.value = val.toFixed(1);
            
            // Visual feedback for change
            const display = document.getElementById('fat-percentage');
            // Simplified logic to "react" to changes visually
            const currentFat = parseFloat(display.innerText);
            const newFat = currentFat + (delta * 0.1);
            display.innerText = newFat.toFixed(1) + '%';
            
            // Impact pulse effect
            display.classList.remove('animate-pulse-subtle');
            void display.offsetWidth; // Trigger reflow
            display.classList.add('animate-pulse-subtle');
        }

        function toggleGender(btn) {
            const container = btn.parentElement;
            const buttons = container.querySelectorAll('button');
            buttons.forEach(b => {
                b.classList.remove('bg-primary-container', 'text-on-primary-container');
                b.classList.add('text-on-surface-variant', 'hover:bg-surface-variant/20');
            });
            btn.classList.add('bg-primary-container', 'text-on-primary-container');
            btn.classList.remove('text-on-surface-variant', 'hover:bg-surface-variant/20');
        }

        // Haptic feedback simulation for mobile
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('click', () => {
                if (window.navigator && window.navigator.vibrate) {
                    window.navigator.vibrate(10);
                }
            });
        });

        // Monitor inputs for real-time updates
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('input', () => {
                const display = document.getElementById('fat-percentage');
                // Simulate calculation logic
                const mockFat = (12 + Math.random() * 5).toFixed(1);
                display.innerText = mockFat + '%';
            });
        });
    </script>
